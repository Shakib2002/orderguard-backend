name: orderguard
description: OrderGuard — Fake Order Detection App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications (show FCM in foreground)
  flutter_local_notifications: ^17.2.2

  # HTTP client
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
