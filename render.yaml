services:
  - type: web
    name: orderguard-backend
    runtime: node
    plan: free
    region: singapore          # Closest to Bangladesh

    # Source
    rootDir: .
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/app.js

    # Health check — Render pings this to verify service is up
    healthCheckPath: /api/v1/health

    # Auto-deploy on push to main branch
    autoDeploy: true

    # Environment variables
    # Set these in Render Dashboard → Environment tab
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_VERSION
        value: 1.0.0
      # --- Set the following as SECRET values in Render dashboard ---
      # DATABASE_URL
      # JWT_ACCESS_SECRET
      # JWT_REFRESH_SECRET
      # ENCRYPTION_KEY
      # ALLOWED_ORIGINS
      # TWILIO_ACCOUNT_SID        (optional)
      # TWILIO_AUTH_TOKEN         (optional)
      # TWILIO_FROM_NUMBER        (optional)

    # Render free tier spins down after 15min of inactivity.
    # Use UptimeRobot or similar to ping /api/v1/health every 14min.
